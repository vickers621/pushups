<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Push-Ups">
<meta name="theme-color" content="#0b0d12">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Push-Ups</title>
<style>
  :root {
    --bg: #0b0d12;
    --card: #151a23;
    --card-2: #1c2330;
    --line: #28303d;
    --text: #f2f5fa;
    --muted: #8b97a8;
    --accent: #ff6b3d;
    --accent-2: #ffb03d;
    --good: #3ddc84;
    --ring-track: #28303d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
  body { padding: max(20px, env(safe-area-inset-top)) 18px calc(28px + env(safe-area-inset-bottom)); max-width: 540px; margin: 0 auto; }

  .quote { background: linear-gradient(135deg, var(--card-2), var(--card));
    border: 1px solid var(--line); border-radius: 16px; padding: 16px 18px; margin-bottom: 18px; }
  .quote p { margin: 0; font-size: 15px; line-height: 1.45; font-style: italic; }
  .quote span { display: block; margin-top: 8px; font-size: 12px; color: var(--muted); font-style: normal; }

  .ring-wrap { display: flex; flex-direction: column; align-items: center; margin: 6px 0 22px; }
  .ring { position: relative; width: 200px; height: 200px; }
  .ring svg { transform: rotate(-90deg); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; }
  .ring-total { font-size: 52px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .ring-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .goal-line { font-size: 13px; color: var(--muted); margin-top: 12px; }
  .goal-line b { color: var(--good); }

  .stats { display: flex; gap: 10px; margin-bottom: 22px; }
  .stat { flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 12px; text-align: center; }
  .stat .v { font-size: 24px; font-weight: 800; }
  .stat .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
  .stat .fire { color: var(--accent); }

  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted);
    margin: 0 0 12px; font-weight: 600; }

  .quick { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .qbtn { background: var(--card); border: 1px solid var(--line); color: var(--text);
    border-radius: 14px; padding: 18px 0; font-size: 20px; font-weight: 700; cursor: pointer;
    transition: transform .06s ease, background .15s ease; }
  .qbtn:active { transform: scale(.93); background: var(--card-2); }

  .custom-row { display: flex; gap: 10px; margin-bottom: 26px; }
  .custom-row input { flex: 1; background: var(--card); border: 1px solid var(--line);
    color: var(--text); border-radius: 14px; padding: 0 18px; font-size: 18px; font-weight: 600;
    min-width: 0; -webkit-appearance: none; }
  .custom-row input::placeholder { color: var(--muted); font-weight: 500; }
  .add-btn { background: linear-gradient(135deg, var(--accent), var(--accent-2)); border: none;
    color: #1a1205; border-radius: 14px; padding: 16px 22px; font-size: 17px; font-weight: 800;
    cursor: pointer; white-space: nowrap; transition: transform .06s ease; }
  .add-btn:active { transform: scale(.95); }

  .chart { display: flex; align-items: flex-end; gap: 3px; height: 110px; margin-bottom: 8px; }
  .bar { flex: 1; background: var(--card-2); border-radius: 3px 3px 0 0; min-height: 2px;
    position: relative; transition: height .3s ease; }
  .bar.has { background: linear-gradient(to top, var(--accent), var(--accent-2)); }
  .bar.today { outline: 2px solid var(--text); outline-offset: 1px; }
  .chart-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }

  .log-list { margin-top: 8px; }
  .log-item { display: flex; justify-content: space-between; align-items: center;
    padding: 11px 2px; border-bottom: 1px solid var(--line); font-size: 14px; }
  .log-item:last-child { border-bottom: none; }
  .log-item .when { color: var(--muted); font-size: 13px; }
  .log-item .amt { font-weight: 700; }
  .log-item button { background: none; border: none; color: var(--muted); font-size: 18px;
    cursor: pointer; padding: 0 4px; line-height: 1; }
  .empty { color: var(--muted); font-size: 14px; padding: 14px 2px; }

  .section { margin-bottom: 26px; }

  .footer { display: flex; gap: 14px; justify-content: center; margin-top: 10px; }
  .footer button { background: none; border: none; color: var(--muted); font-size: 13px;
    cursor: pointer; text-decoration: underline; }

  .toast { position: fixed; left: 50%; bottom: calc(28px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(20px); background: var(--good); color: #06210f;
    padding: 12px 22px; border-radius: 999px; font-weight: 700; font-size: 15px; opacity: 0;
    pointer-events: none; transition: opacity .2s ease, transform .2s ease; z-index: 50; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="quote" id="quote">
    <p id="quote-text"></p>
    <span id="quote-author"></span>
  </div>

  <div class="ring-wrap">
    <div class="ring">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="86" fill="none" stroke="var(--ring-track)" stroke-width="16"/>
        <circle id="ring-fill" cx="100" cy="100" r="86" fill="none" stroke="url(#grad)"
          stroke-width="16" stroke-linecap="round" stroke-dasharray="540.35" stroke-dashoffset="540.35"/>
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="var(--accent)"/>
            <stop offset="100%" stop-color="var(--accent-2)"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="ring-center">
        <div class="ring-total" id="today-total">0</div>
        <div class="ring-sub">today</div>
      </div>
    </div>
    <div class="goal-line" id="goal-line"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v fire" id="streak">0</div><div class="l">🔥 Streak</div></div>
    <div class="stat"><div class="v" id="alltime">0</div><div class="l">All-time</div></div>
    <div class="stat"><div class="v" id="best">0</div><div class="l">Best day</div></div>
  </div>

  <div class="section">
    <h2>Log a set</h2>
    <div class="quick">
      <button class="qbtn" data-n="5">+5</button>
      <button class="qbtn" data-n="10">+10</button>
      <button class="qbtn" data-n="20">+20</button>
      <button class="qbtn" data-n="25">+25</button>
    </div>
    <div class="custom-row">
      <input type="number" id="custom" inputmode="numeric" pattern="[0-9]*" placeholder="e.g. 8" min="1">
      <button class="add-btn" id="add-custom">Add</button>
    </div>
  </div>

  <div class="section">
    <h2>Last 30 days</h2>
    <div class="chart" id="chart"></div>
    <div class="chart-labels"><span>30 days ago</span><span>today</span></div>
  </div>

  <div class="section">
    <h2>Today's sets</h2>
    <div class="log-list" id="log-list"></div>
  </div>

  <div class="footer">
    <button id="set-goal">Goal: <span id="goal-display">50</span></button>
    <button id="export">Export</button>
    <button id="import">Import</button>
  </div>

  <input type="file" id="import-file" accept="application/json" style="display:none">
  <div class="toast" id="toast"></div>

<script>
const STORE_KEY = "pushups.v1";
const QUOTES = [
  ["The body achieves what the mind believes.", "—"],
  ["Push yourself, because no one else is going to do it for you.", "—"],
  ["The only bad workout is the one that didn't happen.", "—"],
  ["Discipline is choosing between what you want now and what you want most.", "Abraham Lincoln"],
  ["Strength does not come from the body. It comes from the will.", "—"],
  ["Don't count the reps. Make the reps count.", "—"],
  ["You don't have to be extreme, just consistent.", "—"],
  ["A one-percent improvement every day adds up fast.", "—"],
  ["Sweat is just fat crying.", "—"],
  ["The pain you feel today is the strength you feel tomorrow.", "—"],
  ["It never gets easier. You just get stronger.", "—"],
  ["Small steps every day.", "—"],
  ["Your only competition is who you were yesterday.", "—"],
  ["Motivation gets you started. Habit keeps you going.", "Jim Ryun"],
  ["Do something today that your future self will thank you for.", "—"],
  ["The hardest lift of all is lifting your butt off the couch.", "—"],
  ["Wake up. Work out. Look hot. Kick ass.", "—"],
  ["One more rep.", "—"],
  ["Fall in love with the process and the results will come.", "Eric Thomas"],
  ["Excuses don't burn calories.", "—"]
];

let state = load();

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { goal: 50, sets: [] }; // sets: [{ts, n}]
}
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function dayKey(ts) {
  const d = new Date(ts);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function todayKey() { return dayKey(Date.now()); }

function totalsByDay() {
  const map = {};
  for (const s of state.sets) {
    const k = dayKey(s.ts);
    map[k] = (map[k] || 0) + s.n;
  }
  return map;
}

function computeStreak(byDay) {
  let streak = 0;
  const d = new Date();
  // If nothing yet today, streak still counts from yesterday backward.
  if (!byDay[todayKey()]) d.setDate(d.getDate() - 1);
  while (true) {
    const k = dayKey(d.getTime());
    if (byDay[k] && byDay[k] > 0) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

function render() {
  const byDay = totalsByDay();
  const today = byDay[todayKey()] || 0;
  const goal = state.goal;

  document.getElementById("today-total").textContent = today;
  const pct = goal > 0 ? Math.min(today / goal, 1) : 0;
  const circ = 2 * Math.PI * 86;
  document.getElementById("ring-fill").style.strokeDashoffset = circ * (1 - pct);

  const goalLine = document.getElementById("goal-line");
  if (today >= goal && goal > 0) goalLine.innerHTML = "<b>Goal smashed! 🎉</b>";
  else goalLine.textContent = (goal - today) + " to go (goal " + goal + ")";

  document.getElementById("streak").textContent = computeStreak(byDay);
  document.getElementById("alltime").textContent = state.sets.reduce((a,s)=>a+s.n,0);
  const best = Object.values(byDay).reduce((m,v)=>Math.max(m,v),0);
  document.getElementById("best").textContent = best;
  document.getElementById("goal-display").textContent = goal;

  // chart: last 30 days
  const chart = document.getElementById("chart");
  chart.innerHTML = "";
  const max = Math.max(best, goal, 1);
  for (let i = 29; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = dayKey(d.getTime());
    const v = byDay[k] || 0;
    const bar = document.createElement("div");
    bar.className = "bar" + (v > 0 ? " has" : "") + (i === 0 ? " today" : "");
    bar.style.height = (v > 0 ? Math.max(6, (v / max) * 100) : 2) + "%";
    bar.title = k + ": " + v;
    chart.appendChild(bar);
  }

  // today's sets
  const list = document.getElementById("log-list");
  const todays = state.sets.map((s,idx)=>({...s,idx})).filter(s => dayKey(s.ts) === todayKey()).reverse();
  if (todays.length === 0) {
    list.innerHTML = '<div class="empty">No sets yet today. Drop and give me 8. 💪</div>';
  } else {
    list.innerHTML = "";
    for (const s of todays) {
      const t = new Date(s.ts);
      const time = t.toLocaleTimeString([], {hour: "numeric", minute: "2-digit"});
      const row = document.createElement("div");
      row.className = "log-item";
      row.innerHTML = '<span class="amt">+' + s.n + '</span>' +
        '<span class="when">' + time + '</span>' +
        '<button data-del="' + s.idx + '">✕</button>';
      list.appendChild(row);
    }
  }
}

function addSet(n) {
  n = parseInt(n, 10);
  if (!n || n < 1) return;
  state.sets.push({ ts: Date.now(), n });
  save();
  render();
  toast("+" + n + " logged 💪");
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 1600);
}

// --- events ---
document.querySelectorAll(".qbtn").forEach(b =>
  b.addEventListener("click", () => addSet(b.dataset.n)));

document.getElementById("add-custom").addEventListener("click", () => {
  const inp = document.getElementById("custom");
  addSet(inp.value);
  inp.value = "";
  inp.blur();
});
document.getElementById("custom").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("add-custom").click();
});

document.getElementById("log-list").addEventListener("click", e => {
  const del = e.target.getAttribute("data-del");
  if (del !== null) {
    state.sets.splice(parseInt(del, 10), 1);
    save(); render(); toast("Set removed");
  }
});

document.getElementById("set-goal").addEventListener("click", () => {
  const v = prompt("Daily push-up goal:", state.goal);
  if (v !== null) {
    const n = parseInt(v, 10);
    if (n > 0) { state.goal = n; save(); render(); }
  }
});

document.getElementById("export").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "pushups-backup-" + todayKey() + ".json";
  a.click(); URL.revokeObjectURL(url);
});

document.getElementById("import").addEventListener("click", () =>
  document.getElementById("import-file").click());
document.getElementById("import-file").addEventListener("change", e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (data && Array.isArray(data.sets)) {
        state = { goal: data.goal || 50, sets: data.sets };
        save(); render(); toast("Imported ✓");
      } else toast("Invalid file");
    } catch (e) { toast("Invalid file"); }
  };
  reader.readAsText(file);
});

// random quote on open
const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
document.getElementById("quote-text").textContent = "“" + q[0] + "”";
document.getElementById("quote-author").textContent = q[1] === "—" ? "" : q[1];

render();
</script>
</body>
</html>
